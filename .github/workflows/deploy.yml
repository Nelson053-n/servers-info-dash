name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Syntax check
        run: |
          python -m py_compile app/main.py

      - name: Validate example config
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          path = Path("config/servers.example.yaml")
          data = yaml.safe_load(path.read_text(encoding="utf-8"))
          required = {"refresh_interval_sec", "ssh", "servers"}
          missing = required.difference(data.keys())
          if missing:
              raise SystemExit(f"Missing keys in {path}: {sorted(missing)}")
          if not isinstance(data.get("servers"), list):
              raise SystemExit("config.servers must be a list")
          print("config validation: OK")
          PY

      - name: Run tests
        run: |
          pytest -q

  deploy:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script_stop: true
          script: |
            set -e
            cd /opt/servers-info-dash
            git config --global --add safe.directory /opt/servers-info-dash
            git fetch origin main
            git reset --hard origin/main
            /opt/servers-info-dash/.venv/bin/pip install -r requirements.txt
            systemctl restart servers-info-dash.service
            for i in $(seq 1 30); do
              if systemctl is-active --quiet servers-info-dash.service; then
                if curl -fsS http://127.0.0.1:8000/ > /dev/null; then
                  exit 0
                fi
              fi
              sleep 1
            done
            systemctl --no-pager --full status servers-info-dash.service || true
            journalctl -u servers-info-dash --no-pager -n 120 || true
            exit 1