name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script_stop: true
          script: |
            set -e
            cd /opt/servers-info-dash
            git config --global --add safe.directory /opt/servers-info-dash
            git fetch origin main
            git reset --hard origin/main
            /opt/servers-info-dash/.venv/bin/pip install -r requirements.txt
            systemctl restart servers-info-dash.service
            for i in $(seq 1 30); do
              if systemctl is-active --quiet servers-info-dash.service; then
                if curl -fsS http://127.0.0.1:8000/ > /dev/null; then
                  exit 0
                fi
              fi
              sleep 1
            done
            systemctl --no-pager --full status servers-info-dash.service || true
            journalctl -u servers-info-dash --no-pager -n 120 || true
            exit 1