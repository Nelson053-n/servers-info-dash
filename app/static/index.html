<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Server Info Dashboard — MUI</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="alternate icon" href="/static/favicon.svg">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">

    <!-- React, ReactDOM, MUI UMD -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script crossorigin src="https://unpkg.com/@mui/material@5.14.10/umd/material-ui.development.js"></script>
    <script crossorigin src="https://unpkg.com/@mui/icons-material@5.14.10/umd/material-ui-icons.development.js"></script>

    <style>
      html,body,#root{height:100%;margin:0}
      body{font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial}
      a{color:inherit}
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script>
      (function () {
        const React = window.React;
        const ReactDOM = window.ReactDOM;
        const MaterialUI = window['MaterialUI'];
        const Icons = window['materialUIIcons'] || window['MaterialUIIcons'];

        const { createTheme, ThemeProvider, CssBaseline } = MaterialUI;
        const styles = MaterialUI.styles || {};
        const darken = styles.darken;
        const lighten = styles.lighten;

        function safeLighten(col, amt){ try { return lighten ? lighten(col, amt) : col; } catch(e){ return col } }
        function safeDarken(col, amt){ try { return darken ? darken(col, amt) : col; } catch(e){ return col } }

        const primaryBase = '#0A1929';
        const secondaryBase = '#FF7A59';

        let theme = createTheme({
          palette: {
            mode: 'dark',
            primary: { main: primaryBase, contrastText: '#fff' },
            secondary: { main: secondaryBase, contrastText: '#111' },
            background: { default: '#071022', paper: '#0b1a2a' },
          },
          typography: {
            fontFamily: 'Inter, Arial, sans-serif',
            h1: { fontFamily: 'Playfair Display, serif', fontWeight: 800, letterSpacing: '0.06em' },
            h2: { fontFamily: 'Playfair Display, serif', fontWeight: 800, letterSpacing: '0.04em' },
            h3: { fontFamily: 'Playfair Display, serif', fontWeight: 700, letterSpacing: '0.03em' },
            button: { textTransform: 'none', fontWeight: 600 }
          },
          shape: { borderRadius: 12 },
          spacing: 8,
          components: {
            MuiButton: {
              defaultProps: { disableElevation: false },
              styleOverrides: {
                root: { borderRadius: 14, textTransform: 'none' },
                contained: {
                  transition: 'box-shadow 200ms, transform 120ms',
                  '&:hover': { boxShadow: '0 8px 20px rgba(2,6,23,0.5)', transform: 'translateY(-1px)' },
                  '&:active': { boxShadow: 'none', transform: 'translateY(0)' }
                }
              }
            },
            MuiCard: {
              styleOverrides: {
                root: {
                  borderRadius: 16,
                  boxShadow: 'none',
                  border: '1px solid rgba(255,255,255,0.04)',
                  transition: 'border-color 200ms, box-shadow 200ms, transform 200ms',
                  '&:hover': { borderColor: primaryBase, transform: 'translateY(-4px)' }
                }
              }
            },
            MuiTextField: {
              defaultProps: { variant: 'outlined' },
              styleOverrides: {
                root: {
                  '& .MuiOutlinedInput-root': {
                    borderRadius: 10,
                    '& fieldset': { borderWidth: '1px' },
                    '&.Mui-focused fieldset': { borderWidth: '2px' }
                  },
                  '& .MuiInputLabel-root': { fontSize: '0.85rem' }
                }
              }
            }
          }
        });

        const buttonGradient = `linear-gradient(135deg, ${safeLighten(primaryBase,0.08)} 0%, ${primaryBase} 100%)`;
        const accentGradient = `linear-gradient(135deg, ${secondaryBase} 0%, ${safeDarken(secondaryBase,0.08)} 100%)`;

        const { AppBar, Toolbar, Typography, Container, Box, Button, Stack, Grid, Card, CardContent, TextField } = MaterialUI;

        function Header(){
          return React.createElement(AppBar, { position: 'static', color: 'transparent', elevation:0, sx:{ bgcolor:'transparent', borderBottom:'1px solid rgba(255,255,255,0.03)' } },
            React.createElement(Toolbar, { sx:{ display:'flex', justifyContent:'space-between', gap:2 } },
              React.createElement(Stack, { direction:'row', alignItems:'center', spacing:2 },
                React.createElement('img', { src:'/static/favicon.svg', width:36, height:36, style:{ borderRadius:8 } }),
                React.createElement(Typography, { variant:'h6' }, 'Server Info Dashboard')
              ),
              React.createElement(Stack, { direction:'row', spacing:1 },
                React.createElement(Button, { variant:'contained', sx:{ background: buttonGradient }, onClick:()=>{} }, 'Добавить'),
                React.createElement(Button, { variant:'outlined' }, 'Настройки')
              )
            )
          );
        }

        function FormCard(){
          return React.createElement(Card, null,
            React.createElement(CardContent, null,
              React.createElement(Typography, { variant:'h5', gutterBottom:true }, 'Добавить сервер'),
              React.createElement(Stack, { spacing:2 },
                React.createElement(TextField, { label:'Имя сервера', fullWidth:true }),
                React.createElement(TextField, { label:'Host / IP', fullWidth:true }),
                React.createElement(Stack, { direction:'row', spacing:1 },
                  React.createElement(Button, { variant:'contained', sx:{ background: accentGradient } }, 'Сохранить'),
                  React.createElement(Button, { variant:'outlined' }, 'Отмена')
                )
              )
            )
          );
        }

        function ServersCard(){
          const { useState, useEffect } = React;
          const [local, setLocal] = useState(null);
          const [loading, setLoading] = useState(true);
          const [error, setError] = useState(null);
          useEffect(() => {
            let mounted = true;
            async function fetchMetrics(){
              setLoading(true); setError(null);
              try{
                const res = await fetch('/api/metrics', { cache: 'no-store' });
                if(!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                // collector returns local server as first element
                const servers = data.servers || [];
                const localServer = servers.length ? servers[0] : null;
                if(mounted) setLocal({ meta: data, server: localServer });
              }catch(err){
                if(mounted) setError(String(err));
              }finally{
                if(mounted) setLoading(false);
              }
            }
            fetchMetrics();
            // refresh based on refresh_interval_sec or every 5s
            const interval = setInterval(()=>fetchMetrics(), 5000);
            return ()=>{ mounted = false; clearInterval(interval); };
          }, []);

          return React.createElement(Card, null,
            React.createElement(CardContent, null,
              React.createElement(Typography, { variant:'h5', gutterBottom:true }, 'Локальный сервер'),
              loading && React.createElement(Typography, { color:'text.secondary' }, 'Загрузка...'),
              error && React.createElement(Typography, { color:'error' }, error),
              !loading && !error && local && local.server && React.createElement(Box, { sx:{ mt:1 } },
                React.createElement(Typography, { variant:'subtitle1' }, local.server.name || '—'),
                React.createElement(Typography, { color:'text.secondary' }, `Host: ${local.server.host || '—'}`),
                React.createElement(Box, { sx:{ display:'flex', gap:2, mt:1, flexWrap:'wrap' } },
                  React.createElement(Box, null, React.createElement(Typography, { variant:'body2', color:'text.secondary' }, 'CPU:'), React.createElement(Typography, null, local.server.cpu_percent ?? '—')),
                  React.createElement(Box, null, React.createElement(Typography, { variant:'body2', color:'text.secondary' }, 'RAM:'), React.createElement(Typography, null, (local.server.ram_used_gb != null ? `${local.server.ram_used_gb} / ${local.server.ram_total_gb} GB` : '—'))),
                  React.createElement(Box, null, React.createElement(Typography, { variant:'body2', color:'text.secondary' }, 'Uptime (days):'), React.createElement(Typography, null, local.server.uptime_days ?? '—')),
                  React.createElement(Box, null, React.createElement(Typography, { variant:'body2', color:'text.secondary' }, 'RX Mbps:'), React.createElement(Typography, null, local.server.rx_mbps ?? '—')),
                  React.createElement(Box, null, React.createElement(Typography, { variant:'body2', color:'text.secondary' }, 'TX Mbps:'), React.createElement(Typography, null, local.server.tx_mbps ?? '—'))
                )
              ),
              !loading && !error && local && !local.server && React.createElement(Typography, { color:'text.secondary' }, 'Данные локального сервера недоступны')
            )
          );
        }

        function Main(){
          return React.createElement(Container, { sx:{ py:4 } },
            React.createElement(Header, null),
            React.createElement(Grid, { container:true, spacing:3, sx:{ mt:2 } },
              React.createElement(Grid, { item:true, xs:12, md:4 }, React.createElement(FormCard, null)),
              React.createElement(Grid, { item:true, xs:12, md:8 }, React.createElement(ServersCard, null))
            )
          );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(
          React.createElement(ThemeProvider, { theme }, React.createElement(CssBaseline, null), React.createElement(Main, null))
        );
      })();
    </script>
  </body>
</html>
